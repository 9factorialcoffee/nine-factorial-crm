<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
<title>เพิ่มแต้ม · 9! COFFEE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap');
:root{--dark:#1e2820;--copper:#c87941;--cream:#f0ead8;--muted:#8a9a8c;--red:#c0392b;--green2:#3a5040;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans Thai',sans-serif;background:var(--cream);min-height:100vh;display:flex;flex-direction:column;}
/* LOGIN */
#pin-screen{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99;padding:24px;}
.pin-logo{width:60px;height:60px;border-radius:50%;margin:0 auto 16px;box-shadow:0 0 0 5px rgba(200,121,65,.15);}
.pin-t{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:var(--copper);text-align:center;margin-bottom:4px;}
.pin-s{font-size:11px;color:var(--muted);text-align:center;margin-bottom:28px;}
.pin-dots{display:flex;gap:10px;justify-content:center;margin-bottom:20px;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--copper);transition:background .15s;}
.pin-dot.filled{background:var(--copper);}
.pin-err{font-size:11px;color:var(--red);text-align:center;min-height:16px;margin-bottom:8px;}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:240px;}
.np-btn{height:58px;border-radius:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:var(--cream);font-size:20px;font-weight:700;font-family:'Space Grotesk',sans-serif;cursor:pointer;transition:all .15s;}
.np-btn:hover{background:rgba(200,121,65,.15);border-color:var(--copper);}
.np-btn.del{font-size:16px;}
/* MAIN */
.head{background:var(--dark);padding:44px 18px 16px;}
.h-row{display:flex;align-items:center;justify-content:space-between;}
.ht{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;color:var(--copper);}
.hs{font-size:10px;color:var(--muted);margin-top:2px;}
.role-badge{background:rgba(200,121,65,.15);border:1px solid rgba(200,121,65,.3);color:#e09a5a;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;}
.body{flex:1;padding:16px;overflow-y:auto;}
.sec-t{font-size:10px;font-weight:700;color:var(--green2);text-transform:uppercase;letter-spacing:1px;margin-bottom:9px;}
.search-row{display:flex;gap:8px;margin-bottom:14px;}
.si{flex:1;padding:12px 13px;border:1.5px solid #d8d0bc;border-radius:8px;font-family:'Noto Sans Thai',sans-serif;font-size:14px;background:white;outline:none;}
.si:focus{border-color:var(--green2);}
.sbtn{padding:12px 15px;background:var(--dark);color:var(--copper);border:none;border-radius:8px;font-size:15px;cursor:pointer;}
.mfound{background:white;border-radius:12px;padding:13px;display:flex;align-items:center;gap:11px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.07);border-left:3px solid var(--copper);}
.mf-av{width:42px;height:42px;border-radius:50%;background:var(--dark);color:var(--copper);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;font-family:'Space Grotesk',sans-serif;flex-shrink:0;}
.mfn{font-size:14px;font-weight:700;color:var(--dark);}
.mfp{font-size:11px;color:var(--muted);}
.mfpts{font-size:12px;color:var(--copper);font-weight:700;margin-top:2px;}
.oitem{background:white;border-radius:8px;padding:11px 13px;display:flex;align-items:center;gap:10px;margin-bottom:7px;box-shadow:0 1px 5px rgba(0,0,0,.05);}
.oicon{font-size:20px;flex-shrink:0;}
.oinf{flex:1;}
.oname{font-size:12px;font-weight:700;color:var(--dark);}
.oprice{font-size:10px;color:var(--muted);}
.qty-r{display:flex;align-items:center;gap:6px;}
.qb{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--green2);background:white;color:var(--green2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;}
.qn{font-size:13px;font-weight:700;min-width:18px;text-align:center;font-family:'Space Grotesk',sans-serif;}
.sum-box{background:white;border-radius:12px;padding:14px;margin:12px 0;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.sum-r{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;color:var(--muted);}
.sum-r.tot{border-top:1.5px dashed #d8d0bc;margin-top:6px;padding-top:10px;font-size:14px;font-weight:700;color:var(--dark);}
.sum-pts{color:var(--copper);font-weight:700;font-family:'Space Grotesk',sans-serif;}
.btn-confirm{width:100%;padding:15px;background:var(--dark);color:var(--copper);border:none;border-radius:8px;font-family:'Noto Sans Thai',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-confirm:disabled{opacity:.4;cursor:not-allowed;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(30,40,32,.95);color:#e09a5a;padding:11px 18px;border-radius:20px;font-size:12px;font-weight:600;opacity:0;transition:opacity .3s;white-space:nowrap;z-index:200;border:1px solid rgba(200,121,65,.2);}
.toast.show{opacity:1;}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(200,121,65,.3);border-top-color:var(--copper);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>

<div id="main-app" style="display:none">

          <div id="sum-lines"></div>

            <span id="sum-total">0 บาท · <span class="sum-pts">+0 แต้ม</span></span>
          </div>
        </div>

          <span>💬</span> ยืนยัน & แจ้ง LINE

<div class="toast" id="toast"></div>

<script>
const API_BASE = 'YOUR_WORKER_URL';

let pin = '', staffInfo = null, currentMember = null, orderQtys = {};
let rules = [];

// ── PIN ──────────────────────────────────────────────────
function pinKey(k) {
  if (!k || pin.length >= 4) return;
  pin += k;
  updateDots();
  if (pin.length === 4) verifyPin();
}
function pinDel() {
  pin = pin.slice(0,-1);
  updateDots();
  document.getElementById('pin-err').textContent = '';
}
function updateDots() {
  for (let i=0;i<4;i++) {
    document.getElementById('d'+i).classList.toggle('filled', i < pin.length);
  }
}
async function verifyPin() {
  try {
    const res = await fetch(API_BASE + '/staff/verify', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({pin}),
    });
    const data = await res.json();
    if (data.ok) {
      staffInfo = data.staff;
      document.getElementById('staff-name').textContent = data.staff.name;
      document.getElementById('role-badge').textContent = data.staff.role.toUpperCase();
      document.getElementById('pin-screen').style.display = 'none';
      document.getElementById('main-app').style.display = 'flex';
      loadRules();
    } else {
      document.getElementById('pin-err').textContent = 'PIN ไม่ถูกต้อง กรุณาลองใหม่';
      pin = ''; updateDots();
    }
  } catch(e) {
    document.getElementById('pin-err').textContent = 'ไม่สามารถเชื่อมต่อได้';
    pin = ''; updateDots();
  }
}

// ── RULES ────────────────────────────────────────────────
async function loadRules() {
  try {
    const res = await fetch(API_BASE + '/rules');
    const data = await res.json();
    rules = data.rules || [];
    renderOrderItems();
  } catch(e) {}
}

function renderOrderItems() {
  const icons = {'Signature Latte':'☕','Cold Brew Original':'🧊','Butter Croissant':'🥐','Espresso':'☕','House Cake':'🍰'};
  const html = rules.map(r => {
    const qty = orderQtys[r.item_name] || 0;
    const ico = icons[r.item_name] || '🍽️';
    return '<div class="oitem">' +
      '<div class="oicon">' + ico + '</div>' +
      '<div class="oinf"><div class="oname">' + r.item_name + '</div>' +
      '<div class="oprice">' + r.price_thb + ' บาท · +' + r.points + ' แต้ม</div></div>' +
      '<div class="qty-r">' +
      '<button class="qb" onclick="addQty(&quot;' + r.item_name + '&quot;,-1)">−</button>' +
      '<span class="qn" id="qty-' + r.item_name.replace(/ /g,'_') + '">' + qty + '</span>' +
      '<button class="qb" onclick="addQty(&quot;' + r.item_name + '&quot;,1)">+</button>' +
      '</div></div>';
  }).join('');
  document.getElementById('order-items').innerHTML = html;
  updateSummary();
}

function addQty(name, delta) {
  orderQtys[name] = Math.max(0, (orderQtys[name]||0) + delta);
  const id = 'qty-' + name.replace(/ /g,'_');
  const el = document.getElementById(id);
  if (el) el.textContent = orderQtys[name];
  updateSummary();
}

function updateSummary() {
  let totalPts = 0, totalAmt = 0;
  const lines = [];
  rules.forEach(r => {
    const qty = orderQtys[r.item_name] || 0;
    if (qty > 0) {
      totalPts += r.points * qty;
      totalAmt += r.price_thb * qty;
      lines.push(r.item_name + ' ×' + qty + '|=' + (r.price_thb*qty) + ' บาท');
    }
  });
  const hasSummary = lines.length > 0 && currentMember;
  document.getElementById('summary-section').style.display = hasSummary ? 'block' : 'none';
  if (hasSummary) {
    document.getElementById('sum-lines').innerHTML = lines.map(l => {
      const [desc, price] = l.split('|=');
      return '<div class="sum-r"><span>' + desc + '</span><span>' + price + '</span></div>';
    }).join('');
    document.getElementById('sum-total').innerHTML =
      totalAmt + ' บาท · <span class="sum-pts">+' + totalPts + ' แต้ม</span>';
  }
}

// ── SEARCH ───────────────────────────────────────────────
async function searchMember() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  try {
    const res = await fetch(API_BASE + '/members/search?q=' + encodeURIComponent(q));
    const data = await res.json();
    if (data.results && data.results.length) {
      const m = data.results[0];
      currentMember = m;
      document.getElementById('m-av').textContent = m.full_name.charAt(0);
      document.getElementById('m-name').textContent = m.full_name;
      document.getElementById('m-phone').textContent = m.phone + ' · ' + m.tier;
      document.getElementById('m-pts').textContent = '★ ' + m.points.toLocaleString() + ' แต้มสะสม';
      document.getElementById('member-section').style.display = 'block';
      orderQtys = {};
      renderOrderItems();
      showToast('✓ พบสมาชิก: ' + m.full_name);
    } else {
      showToast('ไม่พบสมาชิก กรุณาตรวจสอบเบอร์');
    }
  } catch(e) {
    showToast('ไม่สามารถเชื่อมต่อได้');
  }
}

// ── CONFIRM ──────────────────────────────────────────────
async function confirmOrder() {
  if (!currentMember) return;
  const items = rules
    .filter(r => (orderQtys[r.item_name]||0) > 0)
    .map(r => ({ item_name: r.item_name, qty: orderQtys[r.item_name] }));
  if (!items.length) { showToast('กรุณาเลือกรายการ'); return; }

  const btn = document.getElementById('confirm-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> กำลังบันทึก...';

  try {
    const res = await fetch(API_BASE + '/points/earn', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        member_id: currentMember.id,
        items,
        cashier_id: staffInfo ? String(staffInfo.id) : null,
      }),
    });
    const data = await res.json();
    if (data.ok) {
      showToast('✓ เพิ่ม ' + data.earned + ' แต้ม · แจ้ง LINE แล้ว');
      currentMember.points = data.total_points;
      document.getElementById('m-pts').textContent = '★ ' + data.total_points.toLocaleString() + ' แต้มสะสม';
      orderQtys = {};
      renderOrderItems();
      document.getElementById('summary-section').style.display = 'none';
    } else {
      showToast(data.error || 'เกิดข้อผิดพลาด');
    }
  } catch(e) {
    showToast('ไม่สามารถเชื่อมต่อได้');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<span>💬</span> ยืนยัน & แจ้ง LINE';
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchMember();
});
</script>
</body>
