<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
<title>9! COFFEE · Store App</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e2820">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="9! Store">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap');
:root{--dark:#1e2820;--dark2:#252f27;--copper:#c87941;--copper2:#e09a5a;--cream:#f0ead8;--cream2:#e8e0c8;--muted:#8a9a8c;--red:#c0392b;--green2:#3a5040;--success:#4caf50;--bg:#f0ebe0;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans Thai',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;}

/* ─── PIN LOGIN ─── */
#pin-screen{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99;padding:24px;}
.pin-logo{width:64px;height:64px;border-radius:50%;margin:0 auto 16px;}
.pin-t{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;color:var(--copper);text-align:center;margin-bottom:4px;}
.pin-s{font-size:11px;color:var(--muted);text-align:center;margin-bottom:28px;}
.pin-dots{display:flex;gap:10px;justify-content:center;margin-bottom:20px;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--copper);transition:background .15s;}
.pin-dot.filled{background:var(--copper);}
.pin-err{font-size:11px;color:#ff8a80;text-align:center;min-height:16px;margin-bottom:8px;}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:240px;}
.np-btn{height:58px;border-radius:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:var(--cream);font-size:20px;font-weight:700;font-family:'Space Grotesk',sans-serif;cursor:pointer;transition:all .15s;}
.np-btn:hover{background:rgba(200,121,65,.15);border-color:var(--copper);}

/* ─── HEADER ─── */
.head{background:var(--dark);padding:42px 16px 0;position:sticky;top:0;z-index:20;}
.h-row{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px;}
.h-left{display:flex;align-items:center;gap:10px;}
.h-logo{width:34px;height:34px;border-radius:50%;}
.h-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;color:var(--copper);line-height:1;}
.h-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.logout-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--muted);font-size:11px;padding:6px 12px;border-radius:16px;cursor:pointer;font-family:'Noto Sans Thai',sans-serif;}

/* ─── TABS (scrollable) ─── */
.tabs{display:flex;gap:6px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:7px 14px;border-radius:20px;font-family:'Noto Sans Thai',sans-serif;font-size:12px;cursor:pointer;white-space:nowrap;color:var(--muted);border:1px solid rgba(255,255,255,.1);transition:all .2s;}
.tab.on{background:var(--copper);color:var(--dark);border-color:var(--copper);font-weight:700;}

.body{flex:1;padding:14px;overflow-y:auto;padding-bottom:30px;}
.sec-t{font-size:11px;font-weight:700;color:var(--green2);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.card{background:white;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.card-t{font-size:11px;font-weight:700;color:var(--green2);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.card-t span{font-size:10px;color:var(--muted);font-weight:400;}
.loading-row{text-align:center;padding:20px;color:var(--muted);font-size:12px;}

/* ─── EARN ─── */
.search-row{display:flex;gap:8px;margin-bottom:14px;}
.si{flex:1;padding:12px 13px;border:1.5px solid #d8d0bc;border-radius:8px;font-family:'Noto Sans Thai',sans-serif;font-size:14px;background:white;outline:none;}
.si:focus{border-color:var(--green2);}
.sbtn{padding:12px 16px;background:var(--dark);color:var(--copper);border:none;border-radius:8px;font-size:15px;cursor:pointer;}
.mfound{background:white;border-radius:12px;padding:13px;display:flex;align-items:center;gap:11px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.07);border-left:3px solid var(--copper);}
.mf-av{width:44px;height:44px;border-radius:50%;background:var(--dark);color:var(--copper);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;font-family:'Space Grotesk',sans-serif;flex-shrink:0;}
.mfn{font-size:14px;font-weight:700;color:var(--dark);}
.mfp{font-size:11px;color:var(--muted);}
.mfpts{font-size:12px;color:var(--copper);font-weight:700;margin-top:2px;}
.oitem{background:white;border-radius:8px;padding:11px 13px;display:flex;align-items:center;gap:10px;margin-bottom:7px;box-shadow:0 1px 5px rgba(0,0,0,.05);}
.oicon{font-size:22px;flex-shrink:0;}
.oinf{flex:1;}
.oname{font-size:12px;font-weight:700;color:var(--dark);}
.oprice{font-size:10px;color:var(--muted);margin-top:1px;}
.qty-r{display:flex;align-items:center;gap:7px;}
.qb{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--green2);background:white;color:var(--green2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;}
.qn{font-size:13px;font-weight:700;min-width:18px;text-align:center;font-family:'Space Grotesk',sans-serif;}
.sum-box{background:white;border-radius:12px;padding:16px;margin:12px 0;box-shadow:0 2px 10px rgba(0,0,0,.07);}
.sum-r{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;color:var(--muted);}
.sum-r.tot{border-top:1.5px dashed #d8d0bc;margin-top:6px;padding-top:10px;font-size:14px;font-weight:700;color:var(--dark);}
.sum-pts{color:var(--copper);font-weight:700;font-family:'Space Grotesk',sans-serif;}
.btn-confirm{width:100%;padding:15px;background:var(--dark);color:var(--copper);border:none;border-radius:8px;font-family:'Noto Sans Thai',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-confirm:disabled{opacity:.4;}

/* ─── REDEEM (สำหรับร้าน) ─── */
.rwgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.rwcard{background:white;border-radius:10px;padding:12px;text-align:center;border:1.5px solid transparent;box-shadow:0 1px 5px rgba(0,0,0,.05);}
.rwcard.dim{opacity:.4;}
.rwi{font-size:26px;margin-bottom:5px;}
.rwn{font-size:11px;font-weight:600;color:var(--green2);}
.rwp{font-size:10px;color:var(--muted);margin-top:2px;}
.rwbtn{display:inline-block;margin-top:7px;padding:4px 12px;background:var(--dark);color:var(--copper);border-radius:20px;font-size:10px;font-weight:600;cursor:pointer;border:none;}

/* ─── STATS ─── */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.sc{background:white;border-radius:12px;padding:14px 14px 16px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-bottom:3px solid var(--copper);}
.sc.g{border-bottom-color:var(--success);}.sc.b{border-bottom-color:#2196f3;}.sc.r{border-bottom-color:#f44336;}
.sl{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.5px;}
.sv{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;color:var(--dark);margin:5px 0 3px;line-height:1;}
.sc2{font-size:10px;}.sc2.up{color:var(--success);}.sc2.dn{color:#f44336;}
.chart-wrap{height:120px;position:relative;}
.src-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.src-bar-wrap{flex:1;background:#f0f0e8;border-radius:20px;height:8px;overflow:hidden;}
.src-bar{height:100%;background:var(--copper);border-radius:20px;}
.src-label{font-size:11px;color:var(--dark);min-width:110px;}
.src-val{font-size:11px;font-weight:700;color:var(--copper);min-width:24px;text-align:right;font-family:'Space Grotesk',sans-serif;}

/* ─── MEMBERS ─── */
.memrow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,.05);}
.memrow:last-child{border-bottom:none;}
.mav{width:38px;height:38px;border-radius:50%;background:var(--dark);color:var(--copper);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;font-family:'Space Grotesk',sans-serif;flex-shrink:0;}
.mn{font-size:12px;font-weight:700;color:var(--dark);}
.mp{font-size:10px;color:var(--muted);}
.mpts{font-size:12px;font-weight:700;color:var(--copper);font-family:'Space Grotesk',sans-serif;white-space:nowrap;}

/* ─── HISTORY ─── */
.filter-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.fchip{padding:6px 12px;border-radius:20px;border:1.5px solid #d8d0bc;background:white;font-family:'Noto Sans Thai',sans-serif;font-size:11px;cursor:pointer;color:var(--muted);}
.fchip.on{background:var(--dark);color:var(--copper);border-color:var(--dark);font-weight:600;}
.date-row{display:flex;gap:8px;margin-bottom:10px;align-items:center;}
.date-inp{flex:1;padding:9px 11px;border:1.5px solid #d8d0bc;border-radius:8px;font-family:'Noto Sans Thai',sans-serif;font-size:12px;outline:none;}
.hist-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,.05);}
.hist-item:last-child{border-bottom:none;}
.hist-ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.hist-ic.e{background:#fff3e0;}.hist-ic.r{background:#fce4ec;}
.hist-name{font-size:12px;font-weight:700;color:var(--dark);}
.hist-note{font-size:10px;color:var(--muted);margin-top:1px;}
.hist-pts{font-size:13px;font-weight:700;font-family:'Space Grotesk',sans-serif;white-space:nowrap;}
.hist-pts.e{color:#e65100;}.hist-pts.r{color:var(--red);}
.hist-date{font-size:9px;color:var(--muted);text-align:right;margin-top:2px;}

/* ─── SETTINGS ─── */
.sitem{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(0,0,0,.05);}
.sitem:last-child{border-bottom:none;}
.sico{font-size:20px;flex-shrink:0;}
.sinf{flex:1;}
.sinn{font-size:12px;font-weight:600;color:var(--dark);}
.sinp{font-size:10px;color:var(--muted);}
.sval{font-size:12px;font-weight:700;color:var(--copper);font-family:'Space Grotesk',sans-serif;}
.edit-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--copper);background:transparent;color:var(--copper);font-size:11px;font-weight:600;cursor:pointer;font-family:'Noto Sans Thai',sans-serif;}
.del-btn{padding:4px 8px;border-radius:6px;border:1px solid #f44336;background:transparent;color:#f44336;font-size:11px;cursor:pointer;}
.add-btn{width:100%;padding:11px;border-radius:8px;border:1.5px dashed var(--copper);background:transparent;color:var(--copper);font-size:13px;font-weight:600;cursor:pointer;font-family:'Noto Sans Thai',sans-serif;margin-top:10px;}
.tier-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:8px;margin-bottom:6px;font-size:12px;font-weight:600;}

/* ─── BROADCAST ─── */
.seg-opts{display:flex;flex-wrap:wrap;gap:6px;}
.sch{padding:6px 12px;border-radius:20px;border:1.5px solid #d8d0bc;background:white;font-family:'Noto Sans Thai',sans-serif;font-size:11px;cursor:pointer;color:var(--muted);}
.sch.on{background:var(--dark);color:var(--copper);border-color:var(--dark);font-weight:600;}
.msg-ta{width:100%;height:90px;padding:11px 13px;border:1.5px solid #d8d0bc;border-radius:8px;font-family:'Noto Sans Thai',sans-serif;font-size:12px;resize:none;outline:none;line-height:1.6;margin-top:8px;}
.btn-line{width:100%;padding:14px;background:#06c755;color:white;border:none;border-radius:8px;font-family:'Noto Sans Thai',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}

/* ─── MODAL ─── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-end;}
.modal-bg.hidden{display:none;}
.modal{background:white;border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-height:80vh;overflow-y:auto;}
.modal-t{font-size:16px;font-weight:700;color:var(--dark);margin-bottom:18px;font-family:'Space Grotesk',sans-serif;}
.modal-fg{margin-bottom:14px;}
.modal-lbl{font-size:11px;font-weight:600;color:var(--green2);margin-bottom:5px;display:block;}
.modal-inp{width:100%;padding:11px 13px;border:1.5px solid #d8d0bc;border-radius:8px;font-family:'Noto Sans Thai',sans-serif;font-size:14px;outline:none;}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-save{width:100%;padding:14px;background:var(--dark);color:var(--copper);border:none;border-radius:8px;font-family:'Noto Sans Thai',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;}
.modal-cancel{width:100%;padding:11px;background:transparent;color:var(--muted);border:1px solid #ddd;border-radius:8px;font-family:'Noto Sans Thai',sans-serif;font-size:13px;cursor:pointer;margin-top:8px;}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(30,40,32,.96);color:var(--copper2);padding:11px 18px;border-radius:20px;font-size:12px;font-weight:600;opacity:0;transition:opacity .3s;white-space:nowrap;z-index:400;border:1px solid rgba(200,121,65,.2);}
.toast.show{opacity:1;}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(200,121,65,.3);border-top-color:var(--copper);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ─── EARN METHODS ─── */
.method-tabs{display:flex;gap:8px;margin-bottom:14px;}
.mtab{flex:1;padding:12px 8px;border-radius:10px;border:1.5px solid #d8d0bc;background:white;font-family:'Noto Sans Thai',sans-serif;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);text-align:center;transition:all .2s;}
.mtab.on{background:var(--dark);color:var(--copper);border-color:var(--dark);}
.mtab .mt-ico{font-size:22px;display:block;margin-bottom:4px;}
/* big numpad */
.phone-disp{background:white;border:2px solid #d8d0bc;border-radius:12px;padding:18px;text-align:center;font-size:28px;font-weight:700;font-family:'Space Grotesk',sans-serif;color:var(--dark);letter-spacing:2px;margin-bottom:12px;min-height:64px;}
.phone-disp.empty{color:#ccc;}
.big-numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.bnp{height:64px;border-radius:12px;background:white;border:1.5px solid #d8d0bc;color:var(--dark);font-size:24px;font-weight:700;font-family:'Space Grotesk',sans-serif;cursor:pointer;transition:all .1s;}
.bnp:active{background:var(--cream2);transform:scale(.96);}
.bnp.act{background:var(--dark);color:var(--copper);border-color:var(--dark);}
.bnp.del{font-size:18px;}
/* qr scanner */
#qr-reader{border-radius:12px;overflow:hidden;margin-bottom:10px;}
#qr-reader video{border-radius:12px;}
</style>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>

    <div class="modal-fg"><label class="modal-lbl">ชื่อเมนู</label><input class="modal-inp" id="mr-name" type="text"></div>
    <div class="modal-row">
      <div class="modal-fg"><label class="modal-lbl">ราคา (บาท)</label><input class="modal-inp" id="mr-price" type="number"></div>
      <div class="modal-fg"><label class="modal-lbl">แต้ม</label><input class="modal-inp" id="mr-points" type="number"></div>
    </div>
    <button class="modal-save" onclick="saveRule()">บันทึก</button>
    <button class="modal-cancel" onclick="closeM('modal-rule')">ยกเลิก</button>
  </div>
</div>

<div class="modal-bg hidden" id="modal-reward">
  <div class="modal">
    <div class="modal-t" id="mw-title">เพิ่มของรางวัล</div>
    <input type="hidden" id="mw-id">
    <div class="modal-fg"><label class="modal-lbl">ชื่อของรางวัล</label><input class="modal-inp" id="mw-name" type="text"></div>
    <div class="modal-fg"><label class="modal-lbl">แต้มที่ใช้แลก</label><input class="modal-inp" id="mw-cost" type="number"></div>
    <div class="modal-fg"><label class="modal-lbl">รายละเอียด</label><input class="modal-inp" id="mw-desc" type="text"></div>
    <button class="modal-save" onclick="saveReward()">บันทึก</button>
    <button class="modal-cancel" onclick="closeM('modal-reward')">ยกเลิก</button>
  </div>
</div>

<div class="modal-bg hidden" id="modal-staff">
  <div class="modal">
    <div class="modal-t" id="ms-title">เพิ่มพนักงาน</div>
    <input type="hidden" id="ms-id">
    <div class="modal-fg"><label class="modal-lbl">ชื่อพนักงาน</label><input class="modal-inp" id="ms-name" type="text"></div>
    <div class="modal-row">
      <div class="modal-fg"><label class="modal-lbl">Role</label>
        <select class="modal-inp" id="ms-role"><option value="staff">Staff</option><option value="owner">Owner</option></select></div>
      <div class="modal-fg"><label class="modal-lbl">PIN (4 หลัก)</label><input class="modal-inp" id="ms-pin" type="number"></div>
    </div>
    <button class="modal-save" onclick="saveStaff()">บันทึก</button>
    <button class="modal-cancel" onclick="closeM('modal-staff')">ยกเลิก</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_BASE = 'https://nine-factorial-crm.9factorialcoffee.workers.dev';

// ═══ STATE ═══
let pin='', staffInfo=null, currentMember=null, orderQtys={}, rules=[], allMembers=[];
let qrScanner=null;
let weeklyChart=null, histType='all';

// เมนูตาม role
const MENU = {
  owner: [
    {id:'earn',   label:'➕ สะสมแต้ม'},
    {id:'redeem', label:'🎁 แลกของรางวัล'},
    {id:'dash',   label:'📊 ภาพรวม'},
    {id:'members',label:'👥 สมาชิก'},
    {id:'history',label:'📜 ประวัติ'},
    {id:'settings',label:'⚙️ ตั้งค่า'},
    {id:'bcast',  label:'📢 Broadcast'},
  ],
  staff: [
    {id:'earn',   label:'➕ สะสมแต้ม'},
    {id:'redeem', label:'🎁 แลกของรางวัล'},
  ],
};

// ═══ PIN ═══
function pinKey(k){ if(!k||pin.length>=4)return; pin+=k; updateDots(); if(pin.length===4)verifyPin(); }
function pinDel(){ pin=pin.slice(0,-1); updateDots(); document.getElementById('pin-err').textContent=''; }
function updateDots(){ for(let i=0;i<4;i++)document.getElementById('d'+i).classList.toggle('filled',i<pin.length); }
async function verifyPin(){
  try{
    const res=await fetch(API_BASE+'/staff/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin})});
    const data=await res.json();
    if(data.ok){
      staffInfo=data.staff;
      document.getElementById('staff-info').textContent=data.staff.name+' · '+data.staff.role;
      document.getElementById('pin-screen').style.display='none';
      document.getElementById('app').style.display='flex';
      buildTabs();
    }else{ document.getElementById('pin-err').textContent='PIN ไม่ถูกต้อง'; pin=''; updateDots(); }
  }catch(e){ document.getElementById('pin-err').textContent='เชื่อมต่อไม่ได้'; pin=''; updateDots(); }
}
function logout(){ location.reload(); }

// ═══ TABS ═══
function buildTabs(){
  const menu = MENU[staffInfo.role] || MENU.staff;
  document.getElementById('tabs').innerHTML = menu.map((m,i)=>
    '<div class="tab'+(i===0?' on':'')+'" data-tab="'+m.id+'" onclick="goTab(\''+m.id+'\',this)">'+m.label+'</div>'
  ).join('');
  goTab(menu[0].id, document.querySelector('.tab'));
}
function goTab(id, el){
  if(qrScanner){ try{qrScanner.stop();}catch(e){} qrScanner=null; }
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  if(el) el.classList.add('on');
  else { const t=document.querySelector('.tab[data-tab="'+id+'"]'); if(t)t.classList.add('on'); }
  render(id);
}

// ═══ RENDER ROUTER ═══
function render(id){
  const b=document.getElementById('body');
  if(id==='earn')      renderEarn(b);
  else if(id==='redeem')   renderRedeem(b);
  else if(id==='dash')     renderDash(b);
  else if(id==='members')  renderMembers(b);
  else if(id==='history')  renderHistory(b);
  else if(id==='settings') renderSettings(b);
  else if(id==='bcast')    renderBcast(b);
}

// ═══ EARN ═══
let earnMethod='numpad', phoneBuf='';
function renderEarn(b){
  b.innerHTML=
    '<div class="method-tabs">'+
      '<div class="mtab on" id="m-numpad" onclick="setMethod(\'numpad\')"><span class="mt-ico">🔢</span>กดเบอร์</div>'+
      '<div class="mtab" id="m-qr" onclick="setMethod(\'qr\')"><span class="mt-ico">📷</span>สแกน QR</div>'+
      '<div class="mtab" id="m-type" onclick="setMethod(\'type\')"><span class="mt-ico">⌨️</span>พิมพ์เร็ว</div>'+
    '</div>'+
    '<div id="method-area"></div>'+
    '<div id="earn-member"></div>';
  setMethod('numpad');
  if(currentMember) showEarnMember();
}
function setMethod(m){
  earnMethod=m; phoneBuf='';
  ['numpad','qr','type'].forEach(x=>document.getElementById('m-'+x).classList.toggle('on',x===m));
  if(qrScanner){ try{qrScanner.stop();}catch(e){} qrScanner=null; }
  const area=document.getElementById('method-area');
  if(m==='numpad'){
    area.innerHTML=
      '<div class="phone-disp empty" id="phone-disp">กรอกเบอร์โทร</div>'+
      '<div class="big-numpad">'+
      [1,2,3,4,5,6,7,8,9].map(n=>'<button class="bnp" onclick="npKey(\''+n+'\')">'+n+'</button>').join('')+
      '<button class="bnp del" onclick="npDel()">⌫</button>'+
      '<button class="bnp" onclick="npKey(\'0\')">0</button>'+
      '<button class="bnp act" onclick="npSearch()">🔍</button>'+
      '</div>';
  } else if(m==='qr'){
    area.innerHTML='<div id="qr-reader" style="width:100%"></div><div style="text-align:center;font-size:11px;color:#8a9a8c">ให้ลูกค้าเปิด QR จากเมนู "ดูแต้มของฉัน" ใน LINE</div>';
    startQrScan();
  } else {
    area.innerHTML='<div class="search-row"><input class="si" id="type-input" type="tel" placeholder="เบอร์โทรลูกค้า" inputmode="numeric"><button class="sbtn" onclick="typeSearch()">🔍</button></div>';
    document.getElementById('type-input').addEventListener('keydown',e=>{if(e.key==='Enter')typeSearch();});
  }
}
// numpad
function npKey(k){ if(phoneBuf.length>=10)return; phoneBuf+=k; updPhone(); }
function npDel(){ phoneBuf=phoneBuf.slice(0,-1); updPhone(); }
function updPhone(){
  const d=document.getElementById('phone-disp');
  if(!phoneBuf){ d.textContent='กรอกเบอร์โทร'; d.classList.add('empty'); }
  else { let f=phoneBuf; if(f.length>3&&f.length<=6)f=f.slice(0,3)+'-'+f.slice(3); else if(f.length>6)f=f.slice(0,3)+'-'+f.slice(3,6)+'-'+f.slice(6); d.textContent=f; d.classList.remove('empty'); }
}
function npSearch(){ if(phoneBuf.length<9){showToast('กรอกเบอร์ให้ครบ');return;} doSearch(phoneBuf); }
// qr
function startQrScan(){
  if(typeof Html5Qrcode==='undefined'){ showToast('QR scanner โหลดไม่ได้'); return; }
  qrScanner=new Html5Qrcode('qr-reader');
  qrScanner.start({facingMode:'environment'},{fps:10,qrbox:200},(txt)=>{
    if(qrScanner){ try{qrScanner.stop();}catch(e){} qrScanner=null; }
    doSearch(txt);
  },()=>{}).catch(()=>showToast('เปิดกล้องไม่ได้ ตรวจสอบสิทธิ์'));
}
// type
function typeSearch(){ const q=document.getElementById('type-input').value.trim(); if(q)doSearch(q); }
// shared
async function doSearch(q){
  try{
    const res=await fetch(API_BASE+'/members/search?q='+encodeURIComponent(q));
    const data=await res.json();
    if(data.results&&data.results.length){ currentMember=data.results[0]; orderQtys={}; await loadRules(); showEarnMember(); showToast('✓ พบ: '+currentMember.full_name); }
    else showToast('ไม่พบสมาชิก');
  }catch(e){ showToast('เชื่อมต่อไม่ได้'); }
}
async function loadRules(){ try{ const r=await fetch(API_BASE+'/rules'); rules=(await r.json()).rules||[]; }catch(e){} }
function iconFor(n){ return {'Signature Latte':'☕','Cold Brew Original':'🧊','Butter Croissant':'🥐','Espresso':'☕','House Cake':'🍰'}[n]||'🍽️'; }
function showEarnMember(){
  const m=currentMember;
  let html='<div class="mfound"><div class="mf-av">'+m.full_name.charAt(0)+'</div><div><div class="mfn">'+m.full_name+'</div><div class="mfp">'+m.phone+' · '+m.tier+'</div><div class="mfpts">★ '+m.points.toLocaleString()+' แต้มสะสม</div></div></div>';
  html+='<div class="sec-t">รายการสั่งซื้อ</div><div id="order-items"></div><div id="earn-summary"></div>';
  document.getElementById('earn-member').innerHTML=html;
  renderOrderItems();
}
function renderOrderItems(){
  document.getElementById('order-items').innerHTML=rules.map(r=>{
    const qty=orderQtys[r.item_name]||0;
    return '<div class="oitem"><div class="oicon">'+iconFor(r.item_name)+'</div><div class="oinf"><div class="oname">'+r.item_name+'</div><div class="oprice">'+r.price_thb+' บาท · +'+r.points+' แต้ม</div></div><div class="qty-r"><button class="qb" onclick="addQty(\''+r.item_name+'\',-1)">−</button><span class="qn" id="q-'+r.item_name.replace(/ /g,'_')+'">'+qty+'</span><button class="qb" onclick="addQty(\''+r.item_name+'\',1)">+</button></div></div>';
  }).join('');
  updateSummary();
}
function addQty(name,d){ orderQtys[name]=Math.max(0,(orderQtys[name]||0)+d); const el=document.getElementById('q-'+name.replace(/ /g,'_')); if(el)el.textContent=orderQtys[name]; updateSummary(); }
function updateSummary(){
  let pts=0,amt=0; const lines=[];
  rules.forEach(r=>{const q=orderQtys[r.item_name]||0; if(q>0){pts+=r.points*q;amt+=r.price_thb*q;lines.push([r.item_name+' ×'+q, r.price_thb*q]);}});
  const box=document.getElementById('earn-summary');
  if(!lines.length||!currentMember){ box.innerHTML=''; return; }
  box.innerHTML='<div class="sum-box">'+lines.map(l=>'<div class="sum-r"><span>'+l[0]+'</span><span>'+l[1]+' บาท</span></div>').join('')+
    '<div class="sum-r tot"><span>ยอดรวม</span><span>'+amt+' บาท · <span class="sum-pts">+'+pts+' แต้ม</span></span></div></div>'+
    '<button class="btn-confirm" id="confirm-btn" onclick="confirmEarn()"><span>💬</span> ยืนยัน &amp; แจ้ง LINE</button>';
}
async function confirmEarn(){
  const items=rules.filter(r=>(orderQtys[r.item_name]||0)>0).map(r=>({item_name:r.item_name,qty:orderQtys[r.item_name]}));
  if(!items.length)return;
  const btn=document.getElementById('confirm-btn'); btn.disabled=true; btn.innerHTML='<span class="spin"></span> กำลังบันทึก...';
  try{
    const res=await fetch(API_BASE+'/points/earn',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({member_id:currentMember.id,items,cashier_id:String(staffInfo.id)})});
    const data=await res.json();
    if(data.ok){ showToast('✓ เพิ่ม '+data.earned+' แต้ม · แจ้ง LINE แล้ว'); currentMember.points=data.total_points; currentMember.tier=data.tier; orderQtys={}; showEarnMember(); }
    else showToast(data.error||'ผิดพลาด');
  }catch(e){ showToast('เชื่อมต่อไม่ได้'); }
  finally{ if(document.getElementById('confirm-btn')){btn.disabled=false;btn.innerHTML='<span>💬</span> ยืนยัน &amp; แจ้ง LINE';} }
}

// ═══ REDEEM (ร้านช่วยลูกค้าแลก) ═══
function renderRedeem(b){
  b.innerHTML='<div class="sec-t">ค้นหาสมาชิก</div>'+
    '<div class="search-row"><input class="si" id="rd-search" type="tel" placeholder="เบอร์โทรลูกค้า" inputmode="numeric"><button class="sbtn" onclick="rdSearch()">🔍</button></div><div id="rd-area"></div>';
  document.getElementById('rd-search').addEventListener('keydown',e=>{if(e.key==='Enter')rdSearch();});
}
let rdMember=null;
async function rdSearch(){
  const q=document.getElementById('rd-search').value.trim(); if(!q)return;
  try{
    const res=await fetch(API_BASE+'/members/search?q='+encodeURIComponent(q));
    const data=await res.json();
    if(data.results&&data.results.length){ rdMember=data.results[0]; showRdRewards(); }
    else showToast('ไม่พบสมาชิก');
  }catch(e){ showToast('เชื่อมต่อไม่ได้'); }
}
async function showRdRewards(){
  const m=rdMember;
  let html='<div class="mfound"><div class="mf-av">'+m.full_name.charAt(0)+'</div><div><div class="mfn">'+m.full_name+'</div><div class="mfp">'+m.phone+' · '+m.tier+'</div><div class="mfpts">★ '+m.points.toLocaleString()+' แต้มสะสม</div></div></div>';
  html+='<div class="sec-t">เลือกของรางวัลที่ลูกค้าต้องการแลก</div><div class="rwgrid" id="rd-grid"><div class="loading-row">กำลังโหลด...</div></div>';
  document.getElementById('rd-area').innerHTML=html;
  try{
    const res=await fetch(API_BASE+'/rewards'); const data=await res.json();
    const icons=['☕','🛍️','🎂','🫘','🎁'];
    document.getElementById('rd-grid').innerHTML=(data.rewards||[]).map((r,i)=>{
      const ok=m.points>=r.points_cost;
      return '<div class="rwcard'+(ok?'':' dim')+'"><div class="rwi">'+icons[i%icons.length]+'</div><div class="rwn">'+r.name+'</div><div class="rwp">'+r.points_cost+' แต้ม</div>'+(ok?'<button class="rwbtn" onclick="doRedeem('+r.id+',\''+r.name.replace(/'/g,"")+'\','+r.points_cost+')">แลก</button>':'<div class="rwp" style="color:#c0392b">แต้มไม่พอ</div>')+'</div>';
    }).join('');
  }catch(e){}
}
async function doRedeem(id,name,cost){
  if(!confirm('ยืนยันแลก "'+name+'" ใช้ '+cost+' แต้ม?'))return;
  try{
    const res=await fetch(API_BASE+'/points/redeem',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({member_id:rdMember.id,reward_id:id,cashier_id:String(staffInfo.id)})});
    const data=await res.json();
    if(data.ok){ showToast('✓ แลกสำเร็จ · แจ้ง LINE แล้ว'); rdMember.points=data.remaining_points; rdMember.tier=data.tier; showRdRewards(); }
    else showToast(data.error||'ผิดพลาด');
  }catch(e){ showToast('เชื่อมต่อไม่ได้'); }
}

// ═══ DASHBOARD ═══
async function renderDash(b){
  b.innerHTML='<div class="sg" id="sg"><div class="loading-row" style="grid-column:span 2">กำลังโหลด...</div></div><div class="card"><div class="card-t">สมาชิกใหม่ <span>7 วันล่าสุด</span></div><div class="chart-wrap"><canvas id="chartW"></canvas></div></div><div class="card"><div class="card-t">ช่องทางรู้จักร้าน</div><div id="srcChart"></div></div>';
  try{
    const d=await(await fetch(API_BASE+'/stats')).json();
    document.getElementById('sg').innerHTML=
      sCard('MEMBERS',d.total_members.toLocaleString(),'↑ +'+d.today_new_members+' วันนี้','up','')+
      sCard('SALES TODAY','฿'+(d.today_sales_thb||0).toLocaleString(),'↑ '+d.today_transactions+' รายการ','up','g')+
      sCard('POINTS GIVEN',(d.today_points_earned||0).toLocaleString(),'แต้มแจกวันนี้','up','b')+
      sCard('REDEEMED',(d.today_points_redeemed||0).toLocaleString(),d.today_redeemed_count+' รายการ','dn','r');
    const labels=d.weekly_new_members.map(r=>r.day.substring(5)), vals=d.weekly_new_members.map(r=>r.cnt);
    if(weeklyChart)weeklyChart.destroy();
    weeklyChart=new Chart(document.getElementById('chartW'),{type:'bar',data:{labels,datasets:[{data:vals,backgroundColor:'#c87941',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'#8a9a8c',font:{size:10}}},y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{color:'#8a9a8c',font:{size:10}}}}}});
    const mx=Math.max(...d.source_distribution.map(s=>s.cnt),1);
    document.getElementById('srcChart').innerHTML=d.source_distribution.map(s=>'<div class="src-row"><div class="src-label">'+s.source+'</div><div class="src-bar-wrap"><div class="src-bar" style="width:'+Math.round(s.cnt/mx*100)+'%"></div></div><div class="src-val">'+s.cnt+'</div></div>').join('');
  }catch(e){}
}
function sCard(l,v,s,sc,c){ return '<div class="sc '+c+'"><div class="sl">'+l+'</div><div class="sv">'+v+'</div><div class="sc2 '+sc+'">'+s+'</div></div>'; }

// ═══ MEMBERS ═══
async function renderMembers(b){
  b.innerHTML='<input class="si" style="width:100%;margin-bottom:10px" id="mem-q" type="text" placeholder="ค้นหาชื่อ/เบอร์..." oninput="filterMem()"><div class="card"><div class="card-t">รายชื่อสมาชิก <span id="mem-cnt">-</span></div><div id="mem-list"><div class="loading-row">กำลังโหลด...</div></div></div>';
  try{ const d=await(await fetch(API_BASE+'/members/list')).json(); allMembers=d.members||[]; drawMem(allMembers); document.getElementById('mem-cnt').textContent=allMembers.length+' คน'; }catch(e){}
}
function drawMem(list){
  document.getElementById('mem-list').innerHTML=list.length?list.map(m=>'<div class="memrow"><div class="mav">'+m.full_name.charAt(0)+'</div><div style="flex:1"><div class="mn">'+m.full_name+'</div><div class="mp">'+m.phone+' · '+m.tier+'</div></div><div class="mpts">'+(m.points||0).toLocaleString()+'</div></div>').join(''):'<div class="loading-row">ไม่พบ</div>';
}
function filterMem(){ const q=document.getElementById('mem-q').value.toLowerCase(); drawMem(allMembers.filter(m=>m.full_name.toLowerCase().includes(q)||m.phone.includes(q))); }

// ═══ HISTORY ═══
function renderHistory(b){
  const today=new Date().toISOString().substring(0,10);
  const monthAgo=new Date(Date.now()-30*864e5).toISOString().substring(0,10);
  b.innerHTML=
    '<div class="filter-row">'+
      '<div class="fchip'+(histType==='all'?' on':'')+'" onclick="setHistType(\'all\')">ทั้งหมด</div>'+
      '<div class="fchip'+(histType==='earn'?' on':'')+'" onclick="setHistType(\'earn\')">สะสมแต้ม</div>'+
      '<div class="fchip'+(histType==='redeem'?' on':'')+'" onclick="setHistType(\'redeem\')">แลกของรางวัล</div>'+
    '</div>'+
    '<div class="date-row"><input class="date-inp" type="date" id="h-from" value="'+monthAgo+'"><span style="color:#8a9a8c">ถึง</span><input class="date-inp" type="date" id="h-to" value="'+today+'"><button class="sbtn" onclick="loadHistory()">🔍</button></div>'+
    '<div class="filter-row"><div class="fchip" onclick="quickDate(0)">วันนี้</div><div class="fchip" onclick="quickDate(7)">7 วัน</div><div class="fchip" onclick="quickDate(30)">30 วัน</div></div>'+
    '<div id="hist-summary"></div>'+
    '<div class="card"><div class="card-t">รายการ <span id="hist-cnt">-</span></div><div id="hist-list"><div class="loading-row">เลือกช่วงวันแล้วกดค้นหา</div></div></div>';
  loadHistory();
}
function setHistType(t){ histType=t; renderHistory(document.getElementById('body')); }
function quickDate(days){
  const today=new Date().toISOString().substring(0,10);
  const from=new Date(Date.now()-days*864e5).toISOString().substring(0,10);
  document.getElementById('h-from').value=from; document.getElementById('h-to').value=today; loadHistory();
}
async function loadHistory(){
  const from=document.getElementById('h-from').value, to=document.getElementById('h-to').value;
  document.getElementById('hist-list').innerHTML='<div class="loading-row">กำลังโหลด...</div>';
  try{
    const d=await(await fetch(API_BASE+'/history?type='+histType+'&from='+from+'&to='+to)).json();
    const s=d.summary;
    document.getElementById('hist-summary').innerHTML='<div class="sg"><div class="sc"><div class="sl">แต้มแจก</div><div class="sv">'+s.totalEarn.toLocaleString()+'</div><div class="sc2 up">'+s.earnCount+' รายการ</div></div><div class="sc r"><div class="sl">แต้มแลก</div><div class="sv">'+s.totalRedeem.toLocaleString()+'</div><div class="sc2 dn">'+s.redeemCount+' รายการ</div></div></div>';
    document.getElementById('hist-cnt').textContent=s.count+' รายการ';
    document.getElementById('hist-list').innerHTML=d.transactions.length?d.transactions.map(t=>{
      const e=t.type==='earn';
      return '<div class="hist-item"><div class="hist-ic '+(e?'e':'r')+'">'+(e?'☕':'🎁')+'</div><div style="flex:1"><div class="hist-name">'+t.full_name+'</div><div class="hist-note">'+(t.note||'-')+'</div></div><div><div class="hist-pts '+(e?'e':'r')+'">'+(e?'+':'')+t.points+'</div><div class="hist-date">'+t.created_at.substring(5,16)+'</div></div></div>';
    }).join(''):'<div class="loading-row">ไม่มีรายการในช่วงนี้</div>';
  }catch(e){ document.getElementById('hist-list').innerHTML='<div class="loading-row">เชื่อมต่อไม่ได้</div>'; }
}

// ═══ SETTINGS ═══
async function renderSettings(b){
  b.innerHTML=
    '<div class="card"><div class="card-t">กฎสะสมแต้ม</div><div id="set-rules"><div class="loading-row">กำลังโหลด...</div></div><button class="add-btn" onclick="openRule()">+ เพิ่มเมนู</button></div>'+
    '<div class="card"><div class="card-t">ของรางวัล</div><div id="set-rewards"><div class="loading-row">กำลังโหลด...</div></div><button class="add-btn" onclick="openReward()">+ เพิ่มของรางวัล</button></div>'+
    '<div class="card"><div class="card-t">Tier สมาชิก</div>'+
      '<div class="tier-row" style="background:#f5f0e8;color:#6d4c41">🥉 Bronze <span style="color:#9a8070">0 – 500</span></div>'+
      '<div class="tier-row" style="background:#f0f4f8;color:#1565c0">🥈 Silver <span style="color:#90a4ae">501 – 1,500</span></div>'+
      '<div class="tier-row" style="background:#fffde7;color:#f57f17">🥇 Gold <span style="color:#ffd54f">1,501 – 3,000</span></div>'+
      '<div class="tier-row" style="background:#1e2820;color:#c87941">💎 Platinum <span style="color:rgba(200,121,65,.5)">3,001+</span></div>'+
    '</div>'+
    '<div class="card"><div class="card-t">จัดการพนักงาน / PIN</div><div id="set-staff"><div class="loading-row">กำลังโหลด...</div></div><button class="add-btn" onclick="openStaff()">+ เพิ่มพนักงาน</button></div>';
  loadSetRules(); loadSetRewards(); loadSetStaff();
}
async function loadSetRules(){
  try{ const d=await(await fetch(API_BASE+'/rules')).json();
    document.getElementById('set-rules').innerHTML=(d.rules||[]).map(r=>'<div class="sitem"><div class="sico">'+iconFor(r.item_name)+'</div><div class="sinf"><div class="sinn">'+r.item_name+'</div><div class="sinp">'+r.price_thb+' บาท</div></div><div style="display:flex;align-items:center;gap:6px"><div class="sval">'+r.points+' pts</div><button class="edit-btn" onclick="openRule('+r.id+',\''+r.item_name.replace(/'/g,"")+'\','+r.price_thb+','+r.points+')">แก้</button></div></div>').join('');
  }catch(e){}
}
async function loadSetRewards(){
  try{ const d=await(await fetch(API_BASE+'/rewards')).json();
    document.getElementById('set-rewards').innerHTML=(d.rewards||[]).map(r=>'<div class="sitem"><div class="sico">🎁</div><div class="sinf"><div class="sinn">'+r.name+'</div><div class="sinp">'+(r.description||'')+'</div></div><div style="display:flex;align-items:center;gap:6px"><div class="sval">'+r.points_cost+' pts</div><button class="edit-btn" onclick="openReward('+r.id+',\''+r.name.replace(/'/g,"")+'\','+r.points_cost+',\''+(r.description||'').replace(/'/g,"")+'\')">แก้</button><button class="del-btn" onclick="delReward('+r.id+',\''+r.name.replace(/'/g,"")+'\')">ลบ</button></div></div>').join('');
  }catch(e){}
}
async function loadSetStaff(){
  try{ const d=await(await fetch(API_BASE+'/staff/list')).json();
    document.getElementById('set-staff').innerHTML=(d.staff||[]).map(s=>'<div class="sitem"><div class="sico">'+(s.role==='owner'?'👑':'👤')+'</div><div class="sinf"><div class="sinn">'+s.name+'</div><div class="sinp">'+s.role+' · PIN ****</div></div><div style="display:flex;gap:6px"><button class="edit-btn" onclick="openStaff('+s.id+',\''+s.name.replace(/'/g,"")+'\',\''+s.role+'\')">แก้</button>'+(s.role!=='owner'?'<button class="del-btn" onclick="delStaff('+s.id+',\''+s.name.replace(/'/g,"")+'\')">ลบ</button>':'')+'</div></div>').join('');
  }catch(e){ document.getElementById('set-staff').innerHTML='<div class="loading-row">โหลดไม่ได้</div>'; }
}

// modals
function openM(id){document.getElementById(id).classList.remove('hidden');}
function closeM(id){document.getElementById(id).classList.add('hidden');}
function openRule(id,name,price,points){
  document.getElementById('mr-title').textContent=id?'แก้ไขเมนู':'เพิ่มเมนู';
  document.getElementById('mr-id').value=id||''; document.getElementById('mr-name').value=name||'';
  document.getElementById('mr-price').value=price||''; document.getElementById('mr-points').value=points||''; openM('modal-rule');
}
async function saveRule(){
  const id=document.getElementById('mr-id').value,name=document.getElementById('mr-name').value.trim();
  const price=parseFloat(document.getElementById('mr-price').value),points=parseInt(document.getElementById('mr-points').value);
  if(!name||!price||!points){showToast('กรอกข้อมูลให้ครบ');return;}
  try{
    const res=await fetch(API_BASE+'/rules'+(id?'/'+id:''),{method:id?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({item_name:name,price_thb:price,points})});
    if((await res.json()).ok){closeM('modal-rule');showToast('✓ บันทึกแล้ว');loadSetRules();}
  }catch(e){showToast('เชื่อมต่อไม่ได้');}
}
function openReward(id,name,cost,desc){
  document.getElementById('mw-title').textContent=id?'แก้ไขของรางวัล':'เพิ่มของรางวัล';
  document.getElementById('mw-id').value=id||''; document.getElementById('mw-name').value=name||'';
  document.getElementById('mw-cost').value=cost||''; document.getElementById('mw-desc').value=desc||''; openM('modal-reward');
}
async function saveReward(){
  const id=document.getElementById('mw-id').value,name=document.getElementById('mw-name').value.trim();
  const cost=parseInt(document.getElementById('mw-cost').value),desc=document.getElementById('mw-desc').value.trim();
  if(!name||!cost){showToast('กรอกข้อมูลให้ครบ');return;}
  try{
    const res=await fetch(API_BASE+'/rewards'+(id?'/'+id:''),{method:id?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,points_cost:cost,description:desc})});
    if((await res.json()).ok){closeM('modal-reward');showToast('✓ บันทึกแล้ว');loadSetRewards();}
  }catch(e){showToast('เชื่อมต่อไม่ได้');}
}
async function delReward(id,name){
  if(!confirm('ลบ "'+name+'"?'))return;
  try{ if((await(await fetch(API_BASE+'/rewards/'+id,{method:'DELETE'})).json()).ok){showToast('✓ ลบแล้ว');loadSetRewards();} }catch(e){}
}
function openStaff(id,name,role){
  document.getElementById('ms-title').textContent=id?'แก้ไขพนักงาน':'เพิ่มพนักงาน';
  document.getElementById('ms-id').value=id||''; document.getElementById('ms-name').value=name||'';
  document.getElementById('ms-role').value=role||'staff'; document.getElementById('ms-pin').value=''; openM('modal-staff');
}
async function saveStaff(){
  const id=document.getElementById('ms-id').value,name=document.getElementById('ms-name').value.trim();
  const role=document.getElementById('ms-role').value,pin2=document.getElementById('ms-pin').value.trim();
  if(!name){showToast('กรอกชื่อ');return;}
  if(!id&&!pin2){showToast('กรอก PIN');return;}
  if(pin2&&(pin2.length!==4||isNaN(pin2))){showToast('PIN ต้อง 4 หลัก');return;}
  try{
    const body={name,role}; if(pin2)body.pin=pin2;
    const res=await fetch(API_BASE+'/staff'+(id?'/'+id:''),{method:id?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const data=await res.json();
    if(data.ok){closeM('modal-staff');showToast('✓ บันทึกแล้ว');loadSetStaff();} else showToast(data.error||'ผิดพลาด');
  }catch(e){showToast('เชื่อมต่อไม่ได้');}
}
async function delStaff(id,name){
  if(!confirm('ลบ "'+name+'"?'))return;
  try{ if((await(await fetch(API_BASE+'/staff/'+id,{method:'DELETE'})).json()).ok){showToast('✓ ลบแล้ว');loadSetStaff();} }catch(e){}
}

// ═══ BROADCAST ═══
let selSeg='all';
function renderBcast(b){
  b.innerHTML='<div class="card"><div class="card-t">กลุ่มเป้าหมาย</div><div class="seg-opts"><div class="sch on" onclick="pickSeg(this,\'all\')">ทุกคน</div><div class="sch" onclick="pickSeg(this,\'gold_plus\')">Gold+</div><div class="sch" onclick="pickSeg(this,\'inactive_30\')">ไม่มา 30 วัน</div><div class="sch" onclick="pickSeg(this,\'birthday_month\')">วันเกิดเดือนนี้</div></div></div>'+
    '<div class="card"><div class="card-t">ข้อความ</div><textarea class="msg-ta" id="bc-msg" placeholder="พิมพ์ข้อความ..."></textarea></div>'+
    '<button class="btn-line" onclick="sendBcast()"><span style="font-size:18px">💬</span> ส่ง Broadcast LINE</button>';
  selSeg='all';
}
function pickSeg(el,s){ document.querySelectorAll('.sch').forEach(c=>c.classList.remove('on')); el.classList.add('on'); selSeg=s; }
async function sendBcast(){
  const msg=document.getElementById('bc-msg').value.trim(); if(!msg){showToast('พิมพ์ข้อความ');return;}
  if(!confirm('ส่ง Broadcast?'))return;
  try{
    const res=await fetch(API_BASE+'/broadcast',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({segment:selSeg,message:msg,sent_by:String(staffInfo.id)})});
    const data=await res.json();
    if(data.ok){showToast('✓ ส่งสำเร็จ '+data.sent_to+' คน');document.getElementById('bc-msg').value='';}else showToast(data.error||'ผิดพลาด');
  }catch(e){showToast('เชื่อมต่อไม่ได้');}
}

function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800); }

// ═══ PWA — register service worker ═══
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
